# Local development Postgres for the api/.
#
# Spin up:
#   docker compose up -d
# Tear down (preserves data):
#   docker compose stop
# Wipe + restart (drops data):
#   docker compose down -v && docker compose up -d
#
# Connection:
#   DATABASE_URL=postgresql://api:dev@localhost:5432/api?schema=public
#
# Copy that into a local .env file (api/.env, gitignored), then:
#   pnpm exec prisma db push   # syncs the schema → creates BandMember table
#   pnpm dev                   # starts NestJS pointed at the local DB
#
# Per ADR-7. Production uses Azure Postgres Flexible Server — see
# scripts/setup-api-azure.sh for the prod equivalent.

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: skintyee-api-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: api
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: api
    ports:
      - "5432:5432"
    volumes:
      - skintyee-api-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U api -d api"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Aspire Dashboard — standalone OpenTelemetry UI. One pane for the API's
  # traces, metrics, and structured logs instead of bouncing between the Azure
  # portal, `az` CLI, and Swagger. The app (run on the host via `pnpm dev`)
  # exports OTLP/gRPC to localhost:18889; view it at http://localhost:18888.
  #
  #   docker compose up -d aspire-dashboard
  #
  # UNSECURED_ALLOW_ANONYMOUS skips the login token — fine for a local-only
  # dashboard bound to 127.0.0.1. Production (ACA) runs the same image WITH
  # auth — see scripts/deploy-aspire-dashboard.sh.
  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:9.0
    container_name: skintyee-aspire-dashboard
    restart: unless-stopped
    environment:
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
    ports:
      - "127.0.0.1:18888:18888"   # dashboard UI
      - "127.0.0.1:18889:18889"   # OTLP/gRPC ingestion

volumes:
  skintyee-api-pgdata:
    name: skintyee-api-pgdata
