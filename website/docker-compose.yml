# Skin Tyee — headless WordPress backend (the CMS) for the Next.js app in web/.
# Fresh, base-theme WordPress on its OWN named volumes, so the archived Elementor
# stack (legacy/, plus the gitignored wp-data/ + db-data/) is left fully untouched.
#
#   ./cms/bootstrap.sh         # bring up + install WP + base theme + sample content
#   open http://localhost:8080/wp-admin        (admin / admin — local dev only)
#   REST:  http://localhost:8080/wp-json/wp/v2
#
# Distinct project name so this fresh stack is fully isolated from the archived
# Elementor stack's containers/volumes (which used the default "website" project).
name: skintyee-cms

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: skintyee
      MYSQL_USER: wp
      MYSQL_PASSWORD: wp
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - cms-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  wordpress:
    image: wordpress:6.7
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: skintyee
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wp
    volumes:
      - cms-wp:/var/www/html

  # On-demand WP-CLI (run via: docker compose run --rm wpcli wp <args>)
  wpcli:
    image: wordpress:cli
    depends_on:
      wordpress:
        condition: service_started
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: skintyee
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wp
    volumes:
      - cms-wp:/var/www/html

volumes:
  cms-db:
  cms-wp:
