name: Build desktop apps

# Builds the Skin Tyee desktop app (Electron) for all three platforms and
# uploads the installers as artifacts. On a version tag (v*) the installers are
# also attached to a GitHub Release.
#
# Why GitHub Actions (not Azure Pipelines like the website): electron-builder
# needs a NATIVE runner per OS — Windows for the NSIS .exe, macOS for the .dmg.
# The band's Azure self-hosted agents (props-agents) are Ubuntu-only, so they
# can't produce mac/win artifacts. GitHub's hosted windows-latest/macos-latest/
# ubuntu-latest runners are the only no-extra-infra way to cut all three. This
# workflow is therefore exempt from the ADR-9 GitHub→Azure migration.
#
# The web bundle each installer wraps is built with ELECTRON_BUILD=1 (via the
# app's web:export:electron script), which points the app at the production API
# (https://api.skintyee.ca) — a distributed desktop build must never fall back
# to the in-memory mock. See app/app.config.js.

on:
  workflow_dispatch:
    # Manual trigger from the Actions tab — build installers on demand without
    # cutting a tag.
  push:
    tags:
      - 'v*'

permissions:
  contents: write # needed to attach installers to a Release on tag builds

concurrency:
  group: build-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows (.exe)
            ebflag: --win
          - os: macos-latest
            label: macOS (.dmg)
            ebflag: --mac
          - os: ubuntu-latest
            label: Linux (AppImage/deb)
            ebflag: --linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web bundle (production API)
        run: pnpm --filter @skintyee/app web:export:electron

      - name: Build installer
        # --publish never: this step only produces artifacts; the Release step
        # below handles attaching them on tag builds.
        # CSC_IDENTITY_AUTO_DISCOVERY=false: build unsigned (no code-sign certs
        # wired yet). Revisit when an Apple Developer ID / Windows cert exists.
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: pnpm --filter @skintyee/app exec electron-builder ${{ matrix.ebflag }} --publish never

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skintyee-desktop-${{ runner.os }}
          path: |
            app/desktop-dist/*.exe
            app/desktop-dist/*.dmg
            app/desktop-dist/*.AppImage
            app/desktop-dist/*.deb
          if-no-files-found: error
          retention-days: 14

      - name: Attach to Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/desktop-dist/*.exe
            app/desktop-dist/*.dmg
            app/desktop-dist/*.AppImage
            app/desktop-dist/*.deb
